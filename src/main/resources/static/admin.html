<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>소셜다모아 — 관리자 문의 관리</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:#F8FBFC; --surface:#FFFFFF; --surface2:#F1F5F9; --surface3:#E8EEF5;
            --border:rgba(71,85,105,0.12); --border2:rgba(71,85,105,0.18);
            --primary:#14B8A6; --secondary:#6366F1;
            --text:#0F172A; --text2:#475569; --text3:#64748B;
            --radius:18px; --radius-sm:12px;
        }
        *{margin:0;padding:0;box-sizing:border-box;}
        body{
            background:
                    radial-gradient(circle at 15% 20%,rgba(20,184,166,0.09),transparent 28%),
                    radial-gradient(circle at 85% 15%,rgba(99,102,241,0.10),transparent 30%),
                    linear-gradient(180deg,#FFFFFF 0%,#F8FBFC 100%);
            color:var(--text);
            font-family:'Noto Sans KR',sans-serif;
            min-height:100vh;
        }
        .wrapper{max-width:1200px;margin:0 auto;padding:0 24px 80px;}
        header{
            display:flex;align-items:center;justify-content:space-between;
            padding:28px 0 20px;border-bottom:1px solid var(--border);
        }
        .logo{display:flex;align-items:center;gap:12px;}
        .logo-mark{
            width:38px;height:38px;border-radius:12px;
            background:linear-gradient(135deg,var(--primary),var(--secondary));
            display:flex;align-items:center;justify-content:center;
            color:#fff;font-size:18px;font-weight:900;
            box-shadow:0 0 24px rgba(20,184,166,0.18);
        }
        .logo-text{font-size:18px;font-weight:700;}
        .header-right{display:flex;align-items:center;gap:10px;}
        .header-badge{
            background:rgba(99,102,241,0.08);
            border:1px solid rgba(99,102,241,0.18);
            border-radius:999px;
            padding:7px 14px;
            font-size:12px;
            color:#4338CA;
        }
        .logout-btn{
            padding:8px 14px;border:none;border-radius:10px;
            background:#ef4444;color:#fff;cursor:pointer;font-weight:700;
        }

        .page-title{padding:42px 0 34px;}
        .page-title h1{
            font-family:'DM Serif Display',serif;
            font-size:clamp(30px,4vw,44px);
            font-weight:400;line-height:1.12;
        }
        .page-title h1 em{font-style:italic;color:var(--primary);}
        .page-title p{margin-top:12px;color:var(--text2);font-size:14px;font-weight:300;}

        .summary-grid{
            display:grid;grid-template-columns:repeat(4,1fr);
            gap:12px;margin-bottom:24px;
        }
        @media(max-width:680px){.summary-grid{grid-template-columns:repeat(2,1fr);}}

        .s-card{
            background:#fff;border:1px solid var(--border);border-radius:12px;
            padding:16px 18px;box-shadow:0 8px 24px rgba(15,23,42,0.06);
        }
        .s-card .sl{font-size:11px;color:var(--text3);font-weight:600;margin-bottom:6px;}
        .s-card .sn{font-size:26px;font-weight:900;line-height:1;}
        .s-card .ss{font-size:11px;color:var(--text3);margin-top:4px;}

        .admin-grid{
            display:grid;grid-template-columns:240px 1fr;gap:24px;align-items:start;
        }
        @media(max-width:860px){.admin-grid{grid-template-columns:1fr;}}

        .panel{
            background:#fff;border:1px solid var(--border);border-radius:18px;
            overflow:hidden;box-shadow:0 18px 40px rgba(15,23,42,0.08);
        }
        .panel-header{
            padding:18px 22px 16px;border-bottom:1px solid var(--border);
            display:flex;align-items:center;gap:10px;
        }
        .panel-body{padding:20px 22px 22px;}
        .panel-icon{
            width:30px;height:30px;border-radius:10px;display:flex;
            align-items:center;justify-content:center;font-size:14px;
            background:rgba(20,184,166,0.16);
        }

        .filter-panel .panel-body{display:flex;flex-direction:column;gap:4px;}
        .fi{
            padding:10px 14px;border-radius:10px;font-size:13px;font-weight:600;
            cursor:pointer;transition:all .18s;color:var(--text2);
            display:flex;align-items:center;justify-content:space-between;
        }
        .fi:hover{background:rgba(20,184,166,0.06);color:var(--text);}
        .fi.active{
            background:linear-gradient(135deg,rgba(20,184,166,0.16),rgba(99,102,241,0.10));
            color:var(--text);
            border:1px solid rgba(20,184,166,0.22);
        }
        .fc{
            background:rgba(20,184,166,0.12);border-radius:999px;
            padding:2px 8px;font-size:11px;font-weight:700;color:#0F766E;
        }

        .stab-bar{display:flex;gap:6px;flex-wrap:wrap;}
        .stab{
            padding:5px 12px;border-radius:9px;font-size:11px;font-weight:700;
            cursor:pointer;border:1px solid var(--border2);
            background:rgba(241,245,249,0.96);color:var(--text3);
        }
        .stab.active{
            background:linear-gradient(135deg,var(--primary),var(--secondary));
            color:#fff;border:none;
        }

        .search-row{
            display:flex;gap:10px;align-items:center;flex-wrap:wrap;
            margin-bottom:14px;
        }
        .search-input{
            flex:1;min-width:220px;
            background:rgba(241,245,249,0.96);
            border:1px solid var(--border2);
            border-radius:12px;
            padding:11px 14px;
            font-size:13px;
            color:var(--text);
            outline:none;
        }
        .search-input:focus{
            border-color:rgba(20,184,166,0.45);
            box-shadow:0 0 0 4px rgba(20,184,166,0.10);
        }
        .sort-select{
            min-width:140px;
            background:rgba(241,245,249,0.96);
            border:1px solid var(--border2);
            border-radius:12px;
            padding:11px 14px;
            font-size:13px;
            color:var(--text);
            outline:none;
        }
        .sort-select:focus{
            border-color:rgba(20,184,166,0.45);
            box-shadow:0 0 0 4px rgba(20,184,166,0.10);
        }
        .search-info{
            font-size:12px;color:var(--text3);margin-bottom:4px;
        }

        .inq-list{display:flex;flex-direction:column;gap:12px;}
        .inq-card{
            background:#fff;border:1px solid var(--border);border-radius:14px;
            padding:18px 20px;transition:all .2s;
            box-shadow:0 4px 16px rgba(15,23,42,0.05);
        }
        .inq-card:hover{
            transform:translateY(-1px);
            box-shadow:0 8px 24px rgba(15,23,42,0.08);
        }
        .inq-card.expanded{
            border-color:rgba(20,184,166,0.35);
            box-shadow:0 12px 32px rgba(20,184,166,0.12);
        }

        .ir1{
            display:flex;align-items:center;gap:8px;margin-bottom:6px;cursor:pointer;
        }
        .ir2{
            display:flex;align-items:center;gap:6px;flex-wrap:wrap;cursor:pointer;
        }

        .i-type{
            padding:3px 10px;border-radius:999px;font-size:11px;font-weight:700;
            background:rgba(99,102,241,0.10);color:#4338CA;
            border:1px solid rgba(99,102,241,0.18);
        }
        .i-title{
            font-size:14px;font-weight:700;flex:1;min-width:0;
            overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
        }
        .i-meta{font-size:11px;color:var(--text3);}
        .i-dot{
            width:3px;height:3px;border-radius:50%;
            background:var(--text3);display:inline-block;
        }

        .sb{
            padding:4px 10px;border-radius:999px;font-size:11px;font-weight:700;
        }
        .sb-p{background:rgba(245,158,11,0.12);color:#92400E;border:1px solid rgba(245,158,11,0.22);}
        .sb-r{background:rgba(99,102,241,0.12);color:#3730A3;border:1px solid rgba(99,102,241,0.22);}
        .sb-d{background:rgba(20,184,166,0.12);color:#0F766E;border:1px solid rgba(20,184,166,0.22);}

        .inq-detail{
            display:none;margin-top:16px;padding-top:16px;border-top:1px solid var(--border);
        }
        .inq-detail.show{display:block;}

        .body-text{
            font-size:13px;line-height:1.8;color:var(--text2);
            background:rgba(241,245,249,0.7);border-radius:10px;
            padding:14px 16px;margin-bottom:14px;
            white-space:pre-wrap;word-break:break-word;
        }

        .attachment-box{margin-bottom:14px;}
        .attachment-link{
            display:block;text-decoration:none;color:var(--text2);
        }
        .attachment-link:hover{text-decoration:underline;}

        .d-actions{
            display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:12px;
        }
        .sc-lbl{font-size:12px;color:var(--text3);font-weight:600;}
        .sts-sel{
            padding:7px 12px;border-radius:9px;font-size:12px;font-weight:600;
            border:1px solid var(--border2);
            background:rgba(241,245,249,0.96);color:var(--text2);
        }

        .reply-list{display:flex;flex-direction:column;gap:8px;margin-bottom:12px;}
        .reply-item{
            background:linear-gradient(135deg,rgba(20,184,166,0.06),rgba(99,102,241,0.04));
            border:1px solid rgba(20,184,166,0.14);
            border-radius:10px;padding:11px 14px;
            font-size:12px;line-height:1.7;color:var(--text2);
        }
        .reply-top{
            display:flex;
            align-items:center;
            justify-content:space-between;
            gap:10px;
            margin-bottom:4px;
        }
        .reply-meta{font-size:11px;color:var(--text3);font-weight:600;}
        .reply-actions{
            display:flex;
            align-items:center;
            gap:10px;
        }
        .reply-edit-btn, .reply-delete-btn{
            border:none;
            background:transparent;
            font-size:12px;
            font-weight:700;
            cursor:pointer;
        }
        .reply-edit-btn{color:#4f46e5;}
        .reply-delete-btn{color:#ef4444;}

        .reply-ta{
            width:100%;background:rgba(241,245,249,0.92);
            border:1px solid var(--border2);border-radius:12px;
            color:var(--text);font-family:'Noto Sans KR',sans-serif;
            font-size:13px;padding:11px 14px;resize:none;min-height:80px;
        }

        .btn-sm{
            padding:7px 13px;border-radius:9px;font-size:12px;font-weight:600;
            cursor:pointer;border:1px solid var(--border2);
            background:rgba(241,245,249,0.96);color:var(--text2);
        }
        .btn-accent{
            background:linear-gradient(135deg,var(--primary),var(--secondary));
            color:#fff;border:none;
        }

        .empty-list{
            display:flex;flex-direction:column;align-items:center;
            padding:54px 20px;color:var(--text3);text-align:center;
        }
        .el-icon{font-size:36px;margin-bottom:12px;opacity:.5;}

        .login-wrap{
            position:fixed;
            inset:0;
            background:
                    radial-gradient(circle at 20% 20%,rgba(20,184,166,0.12),transparent 28%),
                    radial-gradient(circle at 80% 10%,rgba(99,102,241,0.12),transparent 30%),
                    linear-gradient(180deg,#f8fafc 0%,#eef2f7 100%);
            display:flex;
            align-items:center;
            justify-content:center;
            z-index:9999;
            padding:24px;
        }
        .login-box{
            width:100%;
            max-width:400px;
            background:#fff;
            padding:32px 28px;
            border-radius:20px;
            border:1px solid #e5e7eb;
            box-shadow:0 24px 48px rgba(15,23,42,0.12);
        }
        .login-logo{
            display:flex;
            align-items:center;
            gap:10px;
            margin-bottom:8px;
        }
        .login-logo-mark{
            width:36px;
            height:36px;
            border-radius:12px;
            background:linear-gradient(135deg,var(--primary),var(--secondary));
            display:flex;
            align-items:center;
            justify-content:center;
            color:#fff;
            font-weight:900;
            font-size:16px;
        }
        .login-logo-text{
            font-size:18px;
            font-weight:800;
            color:#0f172a;
        }
        .login-sub{
            font-size:12px;
            color:#64748b;
            margin-bottom:20px;
        }
        .login-title{
            font-size:26px;
            font-weight:800;
            color:#0f172a;
            margin-bottom:20px;
            letter-spacing:-0.3px;
        }
        .login-input{
            width:100%;
            padding:13px 14px;
            margin-bottom:12px;
            border-radius:12px;
            border:1px solid #dbe2ea;
            background:#f8fafc;
            font-size:14px;
            outline:none;
            transition:all .2s;
        }
        .login-input:focus{
            border-color:rgba(20,184,166,0.45);
            box-shadow:0 0 0 4px rgba(20,184,166,0.10);
            background:#fff;
        }
        .login-btn{
            width:100%;
            padding:13px 14px;
            border:none;
            border-radius:12px;
            background:linear-gradient(135deg,#0f766e,#334155);
            color:#fff;
            font-weight:800;
            font-size:14px;
            cursor:pointer;
            margin-top:4px;
        }
        .login-err{
            margin-top:12px;
            font-size:13px;
            color:#ef4444;
            display:none;
        }
    </style>
</head>
<body>

<div id="loginWrap" class="login-wrap">
    <div class="login-box">
        <div class="login-logo">
            <div class="login-logo-mark">S</div>
            <div class="login-logo-text">소셜다모아</div>
        </div>
        <div class="login-sub">Admin Panel</div>
        <div class="login-title">관리자 로그인</div>

        <input id="adminId" class="login-input" placeholder="아이디">
        <input id="adminPw" class="login-input" type="password" placeholder="비밀번호">

        <button class="login-btn" onclick="adminLogin()">로그인</button>
        <div id="loginErr" class="login-err">로그인 실패</div>
    </div>
</div>

<div class="wrapper">
    <header>
        <div class="logo">
            <div class="logo-mark">S</div>
            <div class="logo-text">소셜다모아</div>
        </div>
        <div class="header-right">
            <div class="header-badge">관리자 페이지</div>
            <button class="logout-btn" onclick="logout()">로그아웃</button>
        </div>
    </header>

    <div class="page-title">
        <h1>문의 <em>관리</em><br>한눈에 확인하세요</h1>
        <p>접수된 모든 문의를 유형별·상태별로 관리하고 답변합니다.</p>
    </div>

    <div class="summary-grid">
        <div class="s-card">
            <div class="sl">전체 문의</div>
            <div class="sn" id="cntAll">0</div>
            <div class="ss">누적 접수</div>
        </div>
        <div class="s-card">
            <div class="sl">⏳ 미처리</div>
            <div class="sn" id="cntP">0</div>
            <div class="ss">확인 필요</div>
        </div>
        <div class="s-card">
            <div class="sl">🔄 처리중</div>
            <div class="sn" id="cntR">0</div>
            <div class="ss">검토 진행</div>
        </div>
        <div class="s-card">
            <div class="sl">✅ 처리완료</div>
            <div class="sn" id="cntD">0</div>
            <div class="ss">완료</div>
        </div>
    </div>

    <div class="admin-grid">
        <div>
            <div class="panel filter-panel">
                <div class="panel-header">
                    <div class="panel-icon">🗂</div>
                    <h2>유형별 필터</h2>
                </div>
                <div class="panel-body">
                    <div class="fi active" data-f="전체" onclick="applyF(this)">전체 <span class="fc" id="fc-전체">0</span></div>
                    <div class="fi" data-f="오류 신고" onclick="applyF(this)">🐛 오류 신고 <span class="fc" id="fc-오류 신고">0</span></div>
                    <div class="fi" data-f="기능 문의" onclick="applyF(this)">⚙️ 기능 문의 <span class="fc" id="fc-기능 문의">0</span></div>
                    <div class="fi" data-f="계정 문의" onclick="applyF(this)">👤 계정 문의 <span class="fc" id="fc-계정 문의">0</span></div>
                    <div class="fi" data-f="결제 문의" onclick="applyF(this)">💳 결제 문의 <span class="fc" id="fc-결제 문의">0</span></div>
                    <div class="fi" data-f="요청 문의" onclick="applyF(this)">🤔 요청 문의 <span class="fc" id="fc-요청 문의">0</span></div>
                    <div class="fi" data-f="기타 문의" onclick="applyF(this)">📋 기타 문의 <span class="fc" id="fc-기타 문의">0</span></div>
                </div>
            </div>
        </div>

        <div>
            <div class="panel">
                <div class="panel-header" style="justify-content:space-between;flex-wrap:wrap;gap:10px;">
                    <div style="display:flex;align-items:center;gap:10px;">
                        <div class="panel-icon">📋</div>
                        <h2 id="listTitle">전체 문의</h2>
                    </div>
                    <div class="stab-bar">
                        <button class="stab active" onclick="applyS('all',this)">전체</button>
                        <button class="stab" onclick="applyS('미처리',this)">⏳ 미처리</button>
                        <button class="stab" onclick="applyS('처리중',this)">🔄 처리중</button>
                        <button class="stab" onclick="applyS('처리완료',this)">✅ 완료</button>
                    </div>
                </div>

                <div class="panel-body">
                    <div class="search-row">
                        <input type="text" id="searchInput" class="search-input" placeholder="제목, 이메일, 내용, 문의유형으로 검색" oninput="handleSearch(this.value)">
                        <select id="sortSelect" class="sort-select" onchange="changeSort(this.value)">
                            <option value="latest">최신순</option>
                            <option value="oldest">오래된순</option>
                            <option value="pending">미처리 우선</option>
                        </select>
                        <button type="button" class="btn-sm" onclick="clearSearch()">초기화</button>
                    </div>

                    <div class="search-info" id="searchInfo">전체 문의를 표시 중입니다.</div>
                    <div class="inq-list" id="inqList" style="margin-top:16px;"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    var inquiries = [];
    var curFilter = '전체';
    var curStatus = 'all';
    var curKeyword = '';
    var curSort = 'latest';

    var SC = { 미처리:'sb-p', 처리중:'sb-r', 처리완료:'sb-d' };
    var SL = { 미처리:'⏳ 미처리', 처리중:'🔄 처리중', 처리완료:'✅ 처리완료' };

    function api(url, options = {}) {
        options.headers = options.headers || {};
        const token = localStorage.getItem("adminToken");
        if (token) options.headers["Authorization"] = token;
        return fetch(url, options);
    }

    function formatDate(dateString) {
        if (!dateString) return '날짜 없음';
        return new Date(dateString).toLocaleString('ko-KR', {
            year: 'numeric',
            month: '2-digit',
            day: '2-digit',
            hour: '2-digit',
            minute: '2-digit'
        });
    }

    function parseAttachmentNames(text) {
        if (!text || !text.trim()) return [];
        return text.split(',').map(function(name) {
            return name.trim();
        }).filter(function(name) {
            return name.length > 0;
        });
    }

    function downloadAttachment(inquiryId, index) {
        api("/api/admin/inquiries/" + inquiryId + "/attachments/" + index)
            .then(function(res) {
                if (res.status === 401) {
                    showLogin();
                    throw new Error("인증 필요");
                }
                if (!res.ok) throw new Error("다운로드 실패");

                var disposition = res.headers.get("Content-Disposition") || "";
                var fileName = "download";

                var matchUtf8 = disposition.match(/filename\*=UTF-8''([^;]+)/i);
                var matchBasic = disposition.match(/filename="?([^"]+)"?/i);

                if (matchUtf8 && matchUtf8[1]) {
                    fileName = decodeURIComponent(matchUtf8[1]);
                } else if (matchBasic && matchBasic[1]) {
                    fileName = matchBasic[1];
                }

                return res.blob().then(function(blob) {
                    return { blob: blob, fileName: fileName };
                });
            })
            .then(function(data) {
                var url = window.URL.createObjectURL(data.blob);
                var a = document.createElement("a");
                a.href = url;
                a.download = data.fileName;
                document.body.appendChild(a);
                a.click();
                a.remove();
                window.URL.revokeObjectURL(url);
            })
            .catch(function(err) {
                console.error(err);
                if (err.message !== "인증 필요") {
                    alert("첨부파일 다운로드 실패");
                }
            });
    }

    function loadInquiries(openId) {
        api("/api/admin/inquiries")
            .then(function(res) {
                if (res.status === 401) {
                    showLogin();
                    throw new Error("인증 필요");
                }
                if (!res.ok) throw new Error("문의 목록 조회 실패");
                return res.json();
            })
            .then(function(data) {
                inquiries = data.map(function(i) {
                    return {
                        id: i.id,
                        type: i.type,
                        email: i.email,
                        title: i.title,
                        body: i.body,
                        status: i.status || '미처리',
                        date: formatDate(i.createdAt),
                        rawDate: i.createdAt,
                        attachmentNames: parseAttachmentNames(i.attachmentNames),
                        replies: [],
                        detailOpen: openId ? i.id === openId : false
                    };
                });

                if (openId) {
                    var target = inquiries.find(function(i) { return i.id === openId; });
                    if (target) {
                        fetchReplies(openId);
                        return;
                    }
                }

                renderAdmin();
            })
            .catch(function(err) {
                console.error(err);
            });
    }

    function fetchReplies(id) {
        api("/api/admin/replies/" + id)
            .then(function(res) {
                if (res.status === 401) {
                    showLogin();
                    throw new Error("인증 필요");
                }
                if (!res.ok) throw new Error("답변 조회 실패");
                return res.json();
            })
            .then(function(data) {
                var inquiry = inquiries.find(function(i) { return i.id === id; });
                if (inquiry) {
                    inquiry.replies = data;
                    inquiry.detailOpen = true;
                }
                renderAdmin();
            })
            .catch(function(err) {
                console.error(err);
                renderAdmin();
            });
    }

    function updateCounts() {
        document.getElementById('cntAll').textContent = inquiries.length;
        document.getElementById('cntP').textContent = inquiries.filter(function(i){ return i.status === '미처리'; }).length;
        document.getElementById('cntR').textContent = inquiries.filter(function(i){ return i.status === '처리중'; }).length;
        document.getElementById('cntD').textContent = inquiries.filter(function(i){ return i.status === '처리완료'; }).length;

        var types = ['오류 신고', '기능 문의', '계정 문의', '결제 문의', '요청 문의', '기타 문의'];
        types.forEach(function(t) {
            var el = document.getElementById('fc-' + t);
            if (el) el.textContent = inquiries.filter(function(i){ return i.type === t; }).length;
        });

        document.getElementById('fc-전체').textContent = inquiries.length;
    }

    function matchesKeyword(inq, keyword) {
        if (!keyword) return true;
        var q = keyword.toLowerCase();
        return (
            String(inq.title || '').toLowerCase().includes(q) ||
            String(inq.email || '').toLowerCase().includes(q) ||
            String(inq.body || '').toLowerCase().includes(q) ||
            String(inq.type || '').toLowerCase().includes(q)
        );
    }

    function sortList(list) {
        list.sort(function(a, b) {
            if (curSort === 'latest') return new Date(b.rawDate) - new Date(a.rawDate);
            if (curSort === 'oldest') return new Date(a.rawDate) - new Date(b.rawDate);
            if (curSort === 'pending') {
                if (a.status === '미처리' && b.status !== '미처리') return -1;
                if (a.status !== '미처리' && b.status === '미처리') return 1;
                return new Date(b.rawDate) - new Date(a.rawDate);
            }
            return 0;
        });
    }

    function updateSearchInfo(filteredCount) {
        var info = document.getElementById('searchInfo');
        if (!info) return;

        var parts = [];
        if (curFilter !== '전체') parts.push('유형: ' + curFilter);
        if (curStatus !== 'all') parts.push('상태: ' + curStatus);
        if (curKeyword.trim()) parts.push('검색어: ' + curKeyword.trim());
        if (curSort === 'latest') parts.push('정렬: 최신순');
        if (curSort === 'oldest') parts.push('정렬: 오래된순');
        if (curSort === 'pending') parts.push('정렬: 미처리 우선');

        if (parts.length === 0) {
            info.textContent = '전체 문의를 표시 중입니다.';
            return;
        }

        info.textContent = parts.join(' / ') + ' / 결과 ' + filteredCount + '건';
    }

    function renderAdmin() {
        updateCounts();

        var list = inquiries.slice();

        if (curFilter !== '전체') list = list.filter(function(i){ return i.type === curFilter; });
        if (curStatus !== 'all') list = list.filter(function(i){ return i.status === curStatus; });
        list = list.filter(function(i) { return matchesKeyword(i, curKeyword); });

        sortList(list);
        updateSearchInfo(list.length);

        var container = document.getElementById('inqList');

        if (!list.length) {
            container.innerHTML = `
                <div class="empty-list">
                    <div class="el-icon">📭</div>
                    <p>해당 조건의 문의가 없습니다.</p>
                </div>
            `;
            return;
        }

        container.innerHTML = list.map(function(inq) {
            var repliesHtml = '';
            if (inq.replies && inq.replies.length) {
                repliesHtml = `
                    <div class="reply-list">
                        ${inq.replies.map(function(r) {
                    return `
                                <div class="reply-item">
                                    <div class="reply-top">
                                        <div class="reply-meta">관리자 답변 · ${formatDate(r.createdAt)}</div>
                                        <div class="reply-actions">
                                            <button type="button" class="reply-edit-btn" onclick="event.stopPropagation(); editReply(${inq.id}, ${r.id}, '${jsEsc(r.content)}')">수정</button>
                                            <button type="button" class="reply-delete-btn" onclick="event.stopPropagation(); deleteReply(${inq.id}, ${r.id})">삭제</button>
                                        </div>
                                    </div>
                                    ${esc(r.content)}
                                </div>
                            `;
                }).join('')}
                    </div>
                `;
            }

            var attachmentsHtml = '';
            if (inq.attachmentNames && inq.attachmentNames.length) {
                attachmentsHtml = `
                    <div class="attachment-box">
                        <div class="reply-meta" style="margin-bottom:8px;">첨부파일</div>
                        <div style="display:flex;flex-direction:column;gap:6px;">
                            ${inq.attachmentNames.map(function(name, index) {
                    return `
                                    <a class="attachment-link reply-item" href="javascript:void(0)" onclick="event.stopPropagation(); downloadAttachment(${inq.id}, ${index})">
                                        📎 ${esc(name)}
                                    </a>
                                `;
                }).join('')}
                        </div>
                    </div>
                `;
            }

            return `
                <div class="inq-card ${inq.detailOpen ? 'expanded' : ''}">
                    <div class="ir1" onclick="toggleDetail(${inq.id})">
                        <span class="i-type">${inq.type}</span>
                        <span class="i-title">${esc(inq.title)}</span>
                        <span class="sb ${SC[inq.status] || 'sb-p'}">${SL[inq.status] || '⏳ 미처리'}</span>
                    </div>

                    <div class="ir2" onclick="toggleDetail(${inq.id})">
                        <span class="i-meta">#${inq.id}</span>
                        <span class="i-dot"></span>
                        <span class="i-meta">${esc(inq.email)}</span>
                        <span class="i-dot"></span>
                        <span class="i-meta">🕒 ${inq.date}</span>
                    </div>

                    <div class="inq-detail ${inq.detailOpen ? 'show' : ''}">
                        <div class="body-text">${esc(inq.body)}</div>

                        ${attachmentsHtml}

                        <div class="d-actions">
                            <span class="sc-lbl">상태 변경 :</span>
                            <select class="sts-sel" onchange="changeStatus(${inq.id}, this.value)" onclick="event.stopPropagation()">
                                <option value="미처리" ${inq.status === '미처리' ? 'selected' : ''}>⏳ 미처리</option>
                                <option value="처리중" ${inq.status === '처리중' ? 'selected' : ''}>🔄 처리중</option>
                                <option value="처리완료" ${inq.status === '처리완료' ? 'selected' : ''}>✅ 처리완료</option>
                            </select>
                        </div>

                        ${repliesHtml}

                        <textarea class="reply-ta" id="reply-${inq.id}" placeholder="답변을 작성하세요..." onclick="event.stopPropagation()"></textarea>
                        <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:8px;">
                            <button type="button" class="btn-sm" onclick="event.stopPropagation(); deleteInquiry(${inq.id})">삭제</button>
                            <button type="button" class="btn-sm btn-accent" onclick="event.stopPropagation(); saveReply(${inq.id})">답변 등록</button>
                        </div>
                    </div>
                </div>
            `;
        }).join('');
    }

    function toggleDetail(id) {
        var inquiry = inquiries.find(function(i){ return i.id === id; });
        if (!inquiry) return;

        if (inquiry.detailOpen) {
            inquiry.detailOpen = false;
            renderAdmin();
            return;
        }

        inquiries.forEach(function(i) { i.detailOpen = false; });

        inquiry.detailOpen = true;
        fetchReplies(id);
    }

    function saveReply(id) {
        var textarea = document.getElementById('reply-' + id);
        var content = textarea.value.trim();

        if (!content) {
            alert("답변을 입력하세요");
            return;
        }

        api("/api/admin/replies/" + id, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ content: content })
        })
            .then(function(res) {
                if (res.status === 401) {
                    showLogin();
                    throw new Error("인증 필요");
                }
                if (!res.ok) throw new Error("답변 저장 실패");
                return res.json();
            })
            .then(function() {
                return api("/api/admin/inquiries/" + id + "/status", {
                    method: "PATCH",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ status: "처리중" })
                });
            })
            .then(function(res) {
                if (res.status === 401) {
                    showLogin();
                    throw new Error("인증 필요");
                }
                if (!res.ok) throw new Error("상태 변경 실패");
                return res.json();
            })
            .then(function() {
                document.getElementById('reply-' + id).value = "";
                loadInquiries(id);
            })
            .catch(function(err) {
                console.error(err);
                if (err.message !== "인증 필요") alert("답변 저장 또는 상태 변경 실패");
            });
    }

    function editReply(inquiryId, replyId, content) {
        var textarea = document.getElementById('reply-' + inquiryId);
        textarea.value = content;
        textarea.focus();

        var btnArea = textarea.nextElementSibling;
        btnArea.innerHTML = `
            <button type="button" class="btn-sm" onclick="event.stopPropagation(); deleteInquiry(${inquiryId})">삭제</button>
            <button type="button" class="btn-sm" onclick="event.stopPropagation(); cancelEdit(${inquiryId})">취소</button>
            <button type="button" class="btn-sm btn-accent" onclick="event.stopPropagation(); updateReply(${inquiryId}, ${replyId})">수정 저장</button>
        `;
    }

    function updateReply(inquiryId, replyId) {
        var textarea = document.getElementById('reply-' + inquiryId);
        var content = textarea.value.trim();

        if (!content) {
            alert("답변을 입력하세요");
            return;
        }

        api("/api/admin/replies/edit/" + replyId, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ content: content })
        })
            .then(function(res) {
                if (res.status === 401) {
                    showLogin();
                    throw new Error("인증 필요");
                }
                if (!res.ok) throw new Error("답변 수정 실패");
                return res.json();
            })
            .then(function() {
                textarea.value = "";
                loadInquiries(inquiryId);
            })
            .catch(function(err) {
                console.error(err);
                if (err.message !== "인증 필요") alert("답변 수정 실패");
            });
    }

    function cancelEdit(inquiryId) {
        document.getElementById('reply-' + inquiryId).value = "";
        loadInquiries(inquiryId);
    }

    function deleteReply(inquiryId, replyId) {
        if (!confirm("이 답변을 삭제할까요?")) return;

        api("/api/admin/replies/" + replyId, {
            method: "DELETE"
        })
            .then(function(res) {
                if (res.status === 401) {
                    showLogin();
                    throw new Error("인증 필요");
                }
                if (!res.ok) throw new Error("답변 삭제 실패");
                return res.json();
            })
            .then(function() {
                loadInquiries(inquiryId);
            })
            .catch(function(err) {
                console.error(err);
                if (err.message !== "인증 필요") alert("답변 삭제 실패");
            });
    }

    function changeStatus(id, value) {
        api("/api/admin/inquiries/" + id + "/status", {
            method: "PATCH",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ status: value })
        })
            .then(function(res) {
                if (res.status === 401) {
                    showLogin();
                    throw new Error("인증 필요");
                }
                if (!res.ok) throw new Error("상태 변경 실패");
                return res.json();
            })
            .then(function() {
                loadInquiries(id);
            })
            .catch(function(err) {
                console.error(err);
                if (err.message !== "인증 필요") alert("상태 변경 실패");
            });
    }

    function deleteInquiry(id) {
        if (!confirm("이 문의를 삭제할까요?")) return;

        api("/api/admin/inquiries/" + id, {
            method: "DELETE"
        })
            .then(function(res) {
                if (res.status === 401) {
                    showLogin();
                    throw new Error("인증 필요");
                }
                if (!res.ok) throw new Error("삭제 실패");
                return res.json();
            })
            .then(function() {
                alert("문의가 삭제되었습니다.");
                loadInquiries();
            })
            .catch(function(err) {
                console.error(err);
                if (err.message !== "인증 필요") alert("삭제 실패");
            });
    }

    function applyF(el) {
        document.querySelectorAll('.fi').forEach(function(i) { i.classList.remove('active'); });
        el.classList.add('active');
        curFilter = el.dataset.f;
        document.getElementById('listTitle').textContent = (curFilter === '전체' ? '전체 문의' : curFilter);
        renderAdmin();
    }

    function applyS(status, el) {
        document.querySelectorAll('.stab').forEach(function(b) { b.classList.remove('active'); });
        el.classList.add('active');
        curStatus = status;
        renderAdmin();
    }

    function handleSearch(value) {
        curKeyword = value || '';
        renderAdmin();
    }

    function clearSearch() {
        curKeyword = '';
        var input = document.getElementById('searchInput');
        if (input) input.value = '';
        renderAdmin();
    }

    function changeSort(value) {
        curSort = value || 'latest';
        renderAdmin();
    }

    function adminLogin() {
        const id = document.getElementById("adminId").value;
        const pw = document.getElementById("adminPw").value;

        fetch("/api/admin/login", {
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({ id:id, pw:pw })
        })
            .then(function(res){
                if(!res.ok) throw new Error("로그인 실패");
                return res.json();
            })
            .then(function(data){
                localStorage.setItem("adminToken", data.token);
                hideLogin();
                loadInquiries();
            })
            .catch(function(){
                document.getElementById("loginErr").style.display="block";
            });
    }

    function showLogin() {
        document.getElementById("loginWrap").style.display = "flex";
    }

    function hideLogin() {
        document.getElementById("loginWrap").style.display = "none";
        document.getElementById("loginErr").style.display = "none";
    }

    function logout() {
        localStorage.removeItem("adminToken");
        showLogin();
        document.getElementById("adminPw").value = "";
    }

    function esc(s) {
        return String(s)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/\n/g, '<br>');
    }

    function jsEsc(s) {
        return String(s)
            .replace(/\\/g, '\\\\')
            .replace(/'/g, "\\'")
            .replace(/\n/g, "\\n")
            .replace(/\r/g, "");
    }

    document.addEventListener('DOMContentLoaded', function () {
        const token = localStorage.getItem("adminToken");
        if (token) {
            hideLogin();
            loadInquiries();
        } else {
            showLogin();
        }

        document.getElementById("adminPw").addEventListener("keydown", function(e) {
            if (e.key === "Enter") {
                adminLogin();
            }
        });
    });
</script>
</body>
</html>
